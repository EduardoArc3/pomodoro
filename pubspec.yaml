name: pomodoro
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  dotted_border: ^2.1.0
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  intl: ^0.20.2
  path: ^1.9.1
  flutter_local_notifications: ^21.0.0
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/tomatoes/babyy.png"

 

flutter:
  uses-material-design: true

  assets:
    - assets/images/tomatoes/
    - assets/images/